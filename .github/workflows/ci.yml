name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            zig_arch: x86_64-linux
          - os: macos-latest
            zig_arch: aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_TARBALL="zig-${{ matrix.zig_arch }}-${ZIG_VERSION}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TARBALL}"
          echo "Fetching $ZIG_URL"
          curl -fsSL "$ZIG_URL" -o "$ZIG_TARBALL"
          tar -xJf "$ZIG_TARBALL"
          ZIG_DIR="$(pwd)/zig-${{ matrix.zig_arch }}-${ZIG_VERSION}"
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
          "$ZIG_DIR/zig" version

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

      - name: zig build check
        run: zig build check --summary all

      - name: zig build examples
        run: zig build examples --summary all

      - name: zig build e2e
        run: zig build e2e --summary all

  fuzz-smoke:
    name: fuzz (smoke, 2000 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_TARBALL="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_TARBALL}"
          echo "Fetching $ZIG_URL"
          curl -fsSL "$ZIG_URL" -o "$ZIG_TARBALL"
          tar -xJf "$ZIG_TARBALL"
          ZIG_DIR="$(pwd)/zig-x86_64-linux-${ZIG_VERSION}"
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
          "$ZIG_DIR/zig" version

      - name: zig build fuzz
        run: ZPP_FUZZ_ITERS=2000 zig build fuzz --summary all

      - name: Upload crash inputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: tests/fuzz/crashes/
          if-no-files-found: ignore
