name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.1

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

      - name: zig build check
        run: zig build check --summary all

      - name: zig build examples
        run: zig build examples --summary all

      - name: zig build e2e
        run: zig build e2e --summary all

  fuzz-smoke:
    name: fuzz (smoke, 2000 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.1

      - name: zig build fuzz
        run: ZPP_FUZZ_ITERS=2000 zig build fuzz --summary all
        env:
          ZPP_FUZZ_ITERS: "2000"

      - name: Upload crash inputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: tests/fuzz/crashes/
          if-no-files-found: ignore
