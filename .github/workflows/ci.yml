name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            zig_arch: x86_64-linux
            zig_ext: tar.xz
          - os: macos-latest
            zig_arch: aarch64-macos
            zig_ext: tar.xz
          - os: windows-latest
            zig_arch: x86_64-windows
            zig_ext: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Zig (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          ZIG_NAME="zig-${{ matrix.zig_arch }}-${ZIG_VERSION}"
          ZIG_ARCHIVE="${ZIG_NAME}.${{ matrix.zig_ext }}"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}"
          echo "Fetching $ZIG_URL"
          curl -fsSL "$ZIG_URL" -o "$ZIG_ARCHIVE"
          tar -xJf "$ZIG_ARCHIVE"
          ZIG_DIR="$(pwd)/${ZIG_NAME}"
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
          "$ZIG_DIR/zig" version

      - name: Install Zig (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ZigName = "zig-${{ matrix.zig_arch }}-$env:ZIG_VERSION"
          $ZigArchive = "$ZigName.zip"
          $ZigUrl = "https://ziglang.org/download/$env:ZIG_VERSION/$ZigArchive"
          Write-Host "Fetching $ZigUrl"
          Invoke-WebRequest -Uri $ZigUrl -OutFile $ZigArchive
          Expand-Archive -Path $ZigArchive -DestinationPath .
          $ZigDir = Join-Path (Get-Location) $ZigName
          Add-Content -Path $env:GITHUB_PATH -Value $ZigDir
          & "$ZigDir\zig.exe" version

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

      - name: zig build check
        run: zig build check --summary all

      - name: zig build examples
        run: zig build examples --summary all

      - name: zig build e2e
        run: zig build e2e --summary all

      - name: zig build multi-e2e (multi-file imports)
        run: zig build multi-e2e --summary all

      - name: zpp init scaffolds a working project (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ZPP="$PWD/zig-out/bin/zpp"
          tmp=$(mktemp -d)
          pushd "$tmp" >/dev/null
          "$ZPP" init scaffold-test
          cd scaffold-test
          test -f build.zig
          test -f build.zig.zon
          test -f src/main.zpp
          test -f .gitignore
          test -f README.md
          # Placeholder substitution actually happened.
          grep -q '\.name = \.scaffold-test' build.zig.zon
          ! grep -q ZPP_PROJECT_NAME build.zig.zon
          ! grep -q ZPP_PROJECT_FINGERPRINT build.zig.zon
          # The starter program lowers cleanly through the same compiler.
          "$ZPP" check src/main.zpp
          popd >/dev/null

      - name: examples-consumer builds and runs (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd examples-consumer
          out=$(zig build run 2>&1)
          echo "$out"
          grep -qF 'hello from a downstream Zig++ consumer' <<< "$out"
          grep -qF 'event hash = ' <<< "$out"

      - name: examples-consumer builds and runs (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Push-Location examples-consumer
          # std.debug.print writes to stderr; merge into stdout so we can grep.
          $out = (zig build run 2>&1 | Out-String)
          Pop-Location
          Write-Host $out
          if ($out -notmatch [regex]::Escape("hello from a downstream Zig++ consumer")) { throw "downstream output missing" }
          if ($out -notmatch [regex]::Escape("event hash = ")) { throw "event hash missing" }

      - name: zpp init scaffolds a working project (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $zpp = Join-Path $env:GITHUB_WORKSPACE "zig-out\bin\zpp.exe"
          $tmp = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "scaffold-parent") -Force
          Push-Location $tmp.FullName
          & $zpp init scaffold-test
          if (-not (Test-Path "scaffold-test\build.zig")) { throw "build.zig missing" }
          if (-not (Test-Path "scaffold-test\src\main.zpp")) { throw "main.zpp missing" }
          $manifest = Get-Content "scaffold-test\build.zig.zon" -Raw
          if ($manifest -match "ZPP_PROJECT_NAME") { throw "placeholder still present" }
          if ($manifest -notmatch "scaffold-test") { throw "name not substituted" }
          & $zpp check "scaffold-test\src\main.zpp"
          Pop-Location

  fuzz-smoke:
    name: fuzz (smoke, 2000 iters, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            zig_arch: x86_64-linux
            zig_ext: tar.xz
          - os: macos-latest
            zig_arch: aarch64-macos
            zig_ext: tar.xz
          - os: windows-latest
            zig_arch: x86_64-windows
            zig_ext: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Zig (unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          ZIG_NAME="zig-${{ matrix.zig_arch }}-${ZIG_VERSION}"
          ZIG_ARCHIVE="${ZIG_NAME}.${{ matrix.zig_ext }}"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}"
          echo "Fetching $ZIG_URL"
          curl -fsSL "$ZIG_URL" -o "$ZIG_ARCHIVE"
          tar -xJf "$ZIG_ARCHIVE"
          ZIG_DIR="$(pwd)/${ZIG_NAME}"
          echo "$ZIG_DIR" >> "$GITHUB_PATH"
          "$ZIG_DIR/zig" version

      - name: Install Zig (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ZigName = "zig-${{ matrix.zig_arch }}-$env:ZIG_VERSION"
          $ZigArchive = "$ZigName.zip"
          $ZigUrl = "https://ziglang.org/download/$env:ZIG_VERSION/$ZigArchive"
          Write-Host "Fetching $ZigUrl"
          Invoke-WebRequest -Uri $ZigUrl -OutFile $ZigArchive
          Expand-Archive -Path $ZigArchive -DestinationPath .
          $ZigDir = Join-Path (Get-Location) $ZigName
          Add-Content -Path $env:GITHUB_PATH -Value $ZigDir
          & "$ZigDir\zig.exe" version

      - name: zig build fuzz (unix)
        if: runner.os != 'Windows'
        run: ZPP_FUZZ_ITERS=2000 zig build fuzz --summary all

      - name: zig build fuzz (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:ZPP_FUZZ_ITERS = "2000"
          zig build fuzz --summary all

      - name: Upload crash inputs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crashes-${{ matrix.os }}
          path: tests/fuzz/crashes/
          if-no-files-found: ignore

  perf:
    name: bench (lowering throughput)
    runs-on: ubuntu-latest
    # Bench is informational. Keep it out of the required-checks set so a
    # noisy run does not block PRs; surface the numbers in the job summary.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_NAME="zig-x86_64-linux-${ZIG_VERSION}"
          ZIG_ARCHIVE="${ZIG_NAME}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}"
          curl -fsSL "$ZIG_URL" -o "$ZIG_ARCHIVE"
          tar -xJf "$ZIG_ARCHIVE"
          echo "$(pwd)/${ZIG_NAME}" >> "$GITHUB_PATH"

      - name: Run bench
        run: |
          set -euo pipefail
          zig build bench | tee bench-output.md
          {
            echo "## Lowering throughput"
            echo
            cat bench-output.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bench output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-${{ github.sha }}
          path: bench-output.md
          retention-days: 30

  vscode-extension:
    name: vscode extension (tsc compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc compile
        run: npm run compile
