name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "MANIFESTO.md"
      - "LANGUAGE.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "examples/**"
      - "compiler/**"
      - "tools/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_NAME="zig-x86_64-linux-${ZIG_VERSION}"
          ZIG_ARCHIVE="${ZIG_NAME}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/${ZIG_ARCHIVE}"
          curl -fsSL "$ZIG_URL" -o "$ZIG_ARCHIVE"
          tar -xJf "$ZIG_ARCHIVE"
          echo "$(pwd)/${ZIG_NAME}" >> "$GITHUB_PATH"
          "${ZIG_NAME}/zig" version

      - name: Build zpp tools
        run: zig build

      - name: Regenerate API reference from examples
        run: ./zig-out/bin/zpp-doc examples -o docs/src/api

      - name: Install mdBook
        run: |
          set -euo pipefail
          MDBOOK_VERSION="0.4.40"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz
          echo "$(pwd)" >> "$GITHUB_PATH"
          ./mdbook --version

      - name: Build mdBook
        run: cd docs && ../mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
